---
# generic page layout
layout: default
---
<div class="container my-4 my-md-5">
  <section class="editorial-section editorial-page-shell">
    {% if page.title and page.permalink != "/" %}
    <h1 class="h2 mb-4 pb-2 border-bottom">{{ page.title }}</h1>
    {% endif %}
    {{ content }}
  </section>
</div>
